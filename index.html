<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>개념도 작성 도구 (PC)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f0efe9;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── 툴바 ── */
#tb{display:flex;align-items:center;gap:5px;padding:7px 12px;background:#fff;border-bottom:1.5px solid #ddd;flex-shrink:0;flex-wrap:wrap}
.sep{width:1px;height:22px;background:#e0e0e0;margin:0 2px}
.lbl{font-size:11px;color:#999;white-space:nowrap}
button{font-family:inherit;font-size:13px;padding:5px 11px;border:1px solid #ccc;border-radius:7px;background:#fff;cursor:pointer;color:#333}
button:hover{background:#f0eefc;border-color:#7f77dd}
button.prim{background:#534AB7;color:#fff;border-color:#534AB7}
button.prim:hover{background:#3C3489}
button.red{border-color:#f09595;color:#a32d2d}
button.red:hover{background:#fcebeb}
button.on{background:#EEEDFE;border-color:#534AB7;color:#3C3489;font-weight:500}
select{font-family:inherit;font-size:13px;padding:5px 7px;border:1px solid #ccc;border-radius:7px;background:#fff;cursor:pointer}
.sw{width:23px;height:23px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;flex-shrink:0;display:inline-block;vertical-align:middle;transition:transform .1s}
.sw:hover{transform:scale(1.1)}
.sw.on{border-color:#222;transform:scale(1.15)}

/* ── 기호 키보드 ── */
#symbar{display:none;align-items:center;gap:3px;padding:5px 12px;background:#f7f6f0;border-bottom:1px solid #ddd;flex-shrink:0;overflow-x:auto;white-space:nowrap}
#symbar.show{display:flex}
.sg{display:inline-flex;align-items:center;gap:3px;padding-right:8px;margin-right:4px;border-right:1px solid #ddd;flex-shrink:0}
.sg:last-child{border-right:none}
.sgl{font-size:10px;color:#aaa;margin-right:2px;flex-shrink:0}
.sk{font-size:13px;padding:3px 7px;border:1px solid #ccc;border-radius:5px;background:#fff;cursor:pointer;font-family:'Apple SD Gothic Neo','Malgun Gothic',serif;color:#333;white-space:nowrap;line-height:1.4}
.sk:hover{background:#EEEDFE;border-color:#534AB7;color:#3C3489}

/* ── 캔버스 ── */
#wrap{flex:1;overflow:auto;position:relative;background:#f0efe9}
#cv{position:absolute;top:0;left:0;width:3000px;height:2000px}
#svg{position:absolute;top:0;left:0;width:3000px;height:2000px;pointer-events:none}

/* ── 노드 ── */
.node{
  position:absolute;
  border-radius:10px;
  border:2px solid #534AB7;
  background:#EEEDFE;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:80px;
  user-select:none;
  cursor:grab;
}
.node:active{cursor:grabbing}
.node.sel{outline:3px solid #7f77dd;outline-offset:2px}
.node.dragging{opacity:.85;cursor:grabbing}

/* 노드 텍스트 — input 방식 */
.node input.nt{
  font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  font-size:13px;font-weight:500;
  color:#3C3489;background:transparent;
  border:none;outline:none;
  text-align:center;
  padding:9px 12px;
  min-width:60px;max-width:190px;width:80px;
  cursor:inherit;
  pointer-events:none; /* 기본: 드래그 핸들 역할 */
}
.node.editing input.nt{
  pointer-events:auto;
  cursor:text;
  background:rgba(255,255,255,.55);
  border-radius:5px;
}

/* 연결점 */
.dot{position:absolute;width:12px;height:12px;border-radius:50%;background:#534AB7;border:2px solid #fff;cursor:crosshair;opacity:0;transition:opacity .15s;z-index:5}
.node:hover .dot,.node.sel .dot{opacity:1}
.dt{top:-6px;left:50%;transform:translateX(-50%)}
.db{bottom:-6px;left:50%;transform:translateX(-50%)}
.dl{left:-6px;top:50%;transform:translateY(-50%)}
.dr{right:-6px;top:50%;transform:translateY(-50%)}

/* 삭제 버튼 */
.xb{position:absolute;top:-9px;right:-9px;width:20px;height:20px;border-radius:50%;background:#e24b4a;border:2px solid #fff;color:#fff;font-size:13px;line-height:16px;cursor:pointer;display:none;text-align:center;z-index:10}
.node.sel .xb{display:block}
.xb:hover{background:#c62828}

/* 엣지 라벨 */
.elb{position:absolute;transform:translate(-50%,-50%);z-index:5;display:flex;align-items:center;gap:3px}
.elb input{
  font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  font-size:12px;color:#3C3489;
  background:#fff;border:1.5px solid #AFA9EC;
  border-radius:6px;padding:2px 7px;
  text-align:center;width:84px;outline:none;cursor:text;
}
.elb input:focus{border-color:#534AB7;background:#f8f7ff}
.elb.dash input{border-color:#D85A30;color:#993C1D}
.elb.dash input:focus{border-color:#D85A30}
.elb .edel{width:18px;height:18px;border-radius:50%;background:#e24b4a;border:1.5px solid #fff;color:#fff;font-size:11px;line-height:15px;cursor:pointer;text-align:center;flex-shrink:0;opacity:0;transition:opacity .15s}
.elb:hover .edel{opacity:1}

/* 안내 */
#guide{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.9);border:1px solid #ddd;border-radius:8px;padding:5px 14px;font-size:11px;color:#aaa;pointer-events:none;white-space:nowrap}
</style>
</head>
<body>

<div id="tb">
  <span class="lbl">노드</span>
  <button class="prim" id="btnAdd">+ 개념 추가</button>
  <div class="sep"></div>

  <span class="lbl">색상</span>
  <span class="sw on" data-c="purple" style="background:#EEEDFE;border-color:#534AB7" title="보라"></span>
  <span class="sw"    data-c="teal"   style="background:#E1F5EE;border-color:#0F6E56" title="초록"></span>
  <span class="sw"    data-c="amber"  style="background:#FAEEDA;border-color:#854F0B" title="노랑"></span>

  <span class="sw"    data-c="gray"   style="background:#F1EFE8;border-color:#888780" title="회색"></span>
  <div class="sep"></div>

  <span class="lbl">연결선</span>
  <select id="selLine"><option value="solid">실선</option><option value="dashed">점선 (교차연결)</option></select>
  <div class="sep"></div>

  <button class="red" id="btnDel">선택 삭제</button>
  <button class="red" id="btnReset">전체 초기화</button>
  <div class="sep"></div>

  <button id="btnSym">기호 ⌨</button>
  <div class="sep"></div>

  <button class="prim" id="btnSave">저장 (JSON)</button>
  <button id="btnLoad">불러오기</button>
  <input type="file" id="fileIn" accept=".json" style="display:none">
</div>

<!-- 기호 키보드 -->
<div id="symbar">
  <div class="sg">
    <span class="sgl">아래 첨자</span>
    <button class="sk" data-s="₀">₀</button><button class="sk" data-s="₁">₁</button><button class="sk" data-s="₂">₂</button><button class="sk" data-s="₃">₃</button><button class="sk" data-s="₄">₄</button><button class="sk" data-s="₅">₅</button><button class="sk" data-s="₆">₆</button><button class="sk" data-s="₇">₇</button><button class="sk" data-s="₈">₈</button><button class="sk" data-s="₉">₉</button>
  </div>
  <div class="sg">
    <span class="sgl">위 첨자</span>
    <button class="sk" data-s="⁰">⁰</button><button class="sk" data-s="¹">¹</button><button class="sk" data-s="²">²</button><button class="sk" data-s="³">³</button><button class="sk" data-s="⁴">⁴</button><button class="sk" data-s="⁵">⁵</button><button class="sk" data-s="⁶">⁶</button><button class="sk" data-s="⁺">⁺</button><button class="sk" data-s="⁻">⁻</button>
  </div>
  <div class="sg">
    <span class="sgl">화학</span>
    <button class="sk" data-s="→">→</button><button class="sk" data-s="⇌">⇌</button><button class="sk" data-s="δ+">δ+</button><button class="sk" data-s="δ−">δ−</button><button class="sk" data-s="°C">°C</button><button class="sk" data-s="∠">∠</button><button class="sk" data-s="≒">≒</button><button class="sk" data-s="∝">∝</button>
  </div>

    <button class="sk" data-s="H₂O">H₂O</button><button class="sk" data-s="CO₂">CO₂</button><button class="sk" data-s="NH₃">NH₃</button><button class="sk" data-s="CH₄">CH₄</button><button class="sk" data-s="O₂">O₂</button><button class="sk" data-s="N₂">N₂</button><button class="sk" data-s="HCl">HCl</button><button class="sk" data-s="NaCl">NaCl</button><button class="sk" data-s="Na⁺">Na⁺</button><button class="sk" data-s="Cl⁻">Cl⁻</button><button class="sk" data-s="OH⁻">OH⁻</button>
  </div>
  <div class="sg">
    <span class="sgl">수식</span>
    <button class="sk" data-s="6.02×10²³">6.02×10²³</button><button class="sk" data-s="×10">×10</button><button class="sk" data-s="g/mol">g/mol</button><button class="sk" data-s="mol/L">mol/L</button><button class="sk" data-s="22.4L">22.4L</button>
  </div>

    <span class="sgl">기타</span>
    <button class="sk" data-s="↑">↑</button><button class="sk" data-s="↓">↓</button><button class="sk" data-s="↔">↔</button><button class="sk" data-s="∴">∴</button><button class="sk" data-s="∵">∵</button><button class="sk" data-s="±">±</button>
  </div>
</div>

<div id="wrap">
  <div id="cv">
    <svg id="svg" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="mp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
        <marker id="mt" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
        <marker id="ma" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
        <marker id="mc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
        <marker id="mg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
        <marker id="mo" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
      </defs>
      <g id="eg"></g>
      <path id="tp" fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="5 3" d="" display="none"/>
    </svg>
  </div>
  <div id="guide">클릭: 선택 &nbsp;·&nbsp; 선택 후 재클릭: 텍스트 편집 (Enter로 완료) &nbsp;·&nbsp; 테두리 점 드래그: 연결선 &nbsp;·&nbsp; 연결어 라벨 위 ×: 삭제</div>
</div>

<script>
const CV=document.getElementById('cv');
const WR=document.getElementById('wrap');
const EG=document.getElementById('eg');
const TP=document.getElementById('tp');
const symBar=document.getElementById('symbar');

const PAL={
  purple:{bg:'#EEEDFE',st:'#534AB7',tx:'#3C3489',mk:'mp'},
  teal:  {bg:'#E1F5EE',st:'#0F6E56',tx:'#085041',mk:'mt'},
  amber: {bg:'#FAEEDA',st:'#854F0B',tx:'#633806',mk:'ma'},
  coral: {bg:'#FAECE7',st:'#993C1D',tx:'#712B13',mk:'mc'},
  gray:  {bg:'#F1EFE8',st:'#888780',tx:'#444441',mk:'mg'},
};

let nodes={}, edges=[], nc=0, ec=0;
let selId=null, curCol='purple', curLine='solid';
let drag=null;   // {id, ox, oy, moved}
let conn=null;   // {fromId}
let activeInp=null; // 현재 포커스된 input (기호 삽입 대상)

// ── 좌표 ──────────────────────────────────────────────────────
function cXY(e){const r=CV.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}
function nW(id){return nodes[id].el.offsetWidth;}
function nH(id){return nodes[id].el.offsetHeight;}
function cX(id){return nodes[id].x+nW(id)/2;}
function cY(id){return nodes[id].y+nH(id)/2;}

// input 너비 자동 조절
function aw(inp){
  const t=document.createElement('span');
  t.style.cssText='position:absolute;visibility:hidden;pointer-events:none;font:500 13px "Apple SD Gothic Neo","Malgun Gothic",sans-serif;white-space:pre';
  t.textContent=inp.value||inp.placeholder||'개념어';
  document.body.appendChild(t);
  inp.style.width=Math.max(60,Math.min(190,t.offsetWidth+26))+'px';
  document.body.removeChild(t);
}

// ── 기호 키보드 ───────────────────────────────────────────────
document.getElementById('btnSym').addEventListener('click',()=>{
  const on=symBar.classList.toggle('show');
  document.getElementById('btnSym').classList.toggle('on',on);
});

document.querySelectorAll('.sk').forEach(btn=>{
  // mousedown에서 포커스 뺏기지 않도록
  btn.addEventListener('mousedown',e=>e.preventDefault());
  btn.addEventListener('click',()=>{
    if(!activeInp) return;
    const inp=activeInp;
    const s=inp.selectionStart??inp.value.length;
    const en=inp.selectionEnd??inp.value.length;
    const sym=btn.dataset.s;
    inp.value=inp.value.slice(0,s)+sym+inp.value.slice(en);
    inp.selectionStart=inp.selectionEnd=s+sym.length;
    inp.dispatchEvent(new Event('input'));
    inp.focus();
  });
});

// ── 노드 ──────────────────────────────────────────────────────
function addNode(x,y,text,color){
  const id='n'+(++nc);
  const p=PAL[color]||PAL.purple;

  const el=document.createElement('div');
  el.className='node'; el.id=id;
  el.style.cssText=`left:${x}px;top:${y}px;background:${p.bg};border-color:${p.st}`;

  const inp=document.createElement('input');
  inp.className='nt'; inp.type='text';
  inp.value=text||''; inp.placeholder='개념어';
  inp.style.color=p.tx;
  inp.readOnly=true;

  inp.addEventListener('input',()=>{aw(inp);redrawEdges();});
  inp.addEventListener('focus',()=>activeInp=inp);
  inp.addEventListener('blur',()=>{
    inp.readOnly=true;
    el.classList.remove('editing');
    aw(inp); redrawEdges();
    if(activeInp===inp) activeInp=null;
  });
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'||e.key==='Escape') inp.blur();
    e.stopPropagation();
  });
  // 읽기전용일 때 input 클릭 막기 (노드 드래그로 처리)
  inp.addEventListener('mousedown',e=>{if(inp.readOnly) e.preventDefault();});

  // 연결점
  ['dt','db','dl','dr'].forEach(cls=>{
    const d=document.createElement('div');
    d.className='dot '+cls;
    d.addEventListener('mousedown',e=>{
      e.stopPropagation(); e.preventDefault();
      conn={fromId:id};
      TP.setAttribute('d',`M${cX(id)} ${cY(id)} L${cX(id)} ${cY(id)}`);
      TP.setAttribute('display','');
    });
    el.appendChild(d);
  });

  // 삭제 버튼
  const xb=document.createElement('div');
  xb.className='xb'; xb.textContent='×';
  xb.addEventListener('click',e=>{e.stopPropagation();removeNode(id);});
  el.appendChild(xb);

  el.appendChild(inp);
  CV.appendChild(el);

  // mousedown → 드래그 준비
  el.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('dot')) return;
    if(e.target.classList.contains('xb')) return;
    if(!inp.readOnly) return; // 편집 중 드래그 방지
    e.preventDefault();
    selectNode(id);
    const {x:mx,y:my}=cXY(e);
    drag={id, ox:mx-nodes[id].x, oy:my-nodes[id].y, moved:false, startT:Date.now()};
  });

  // click → 선택 or 편집 진입
  el.addEventListener('click',e=>{
    if(e.target.classList.contains('dot')) return;
    if(e.target.classList.contains('xb')) return;
    if(drag?.moved) return;
    // 이미 선택된 노드를 다시 클릭 → 편집 모드
    if(selId===id && inp.readOnly){
      openEdit(id);
    } else {
      selectNode(id);
    }
  });

  nodes[id]={el,inp,x,y,color};
  setTimeout(()=>aw(inp),0);
  return id;
}

function openEdit(id){
  if(!nodes[id]) return;
  const n=nodes[id];
  n.inp.readOnly=false;
  n.el.classList.add('editing');
  n.inp.focus();
  n.inp.select();
  activeInp=n.inp;
}

function selectNode(id){
  if(selId&&nodes[selId]) nodes[selId].el.classList.remove('sel');
  selId=id;
  if(id&&nodes[id]){
    nodes[id].el.classList.add('sel');
    const c=nodes[id].color;
    document.querySelectorAll('.sw').forEach(s=>s.classList.toggle('on',s.dataset.c===c));
  }
}

function removeNode(id){
  nodes[id]?.el.remove(); delete nodes[id];
  edges=edges.filter(e=>{
    if(e.from===id||e.to===id){e.path?.remove();e.lbEl?.remove();return false;}
    return true;
  });
  if(selId===id) selId=null;
}

// ── 엣지 ──────────────────────────────────────────────────────
function addEdge(fromId,toId,style,label){
  const id='e'+(++ec);
  const dash=style==='dashed';
  const col=dash?'#D85A30':(PAL[nodes[fromId]?.color]?.st||'#534AB7');
  const mk=dash?'mo':(PAL[nodes[fromId]?.color]?.mk||'mp');

  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('fill','none');
  path.setAttribute('stroke',col);
  path.setAttribute('stroke-width','2');
  path.setAttribute('marker-end',`url(#${mk})`);
  if(dash) path.setAttribute('stroke-dasharray','6 3');
  EG.appendChild(path);

  const lbDiv=document.createElement('div');
  lbDiv.className='elb'+(dash?' dash':'');

  const lbInp=document.createElement('input');
  lbInp.type='text'; lbInp.placeholder='연결어'; lbInp.maxLength=30;
  lbInp.value=label||'';
  lbInp.addEventListener('mousedown',e=>e.stopPropagation());
  lbInp.addEventListener('focus',()=>activeInp=lbInp);
  lbInp.addEventListener('blur',()=>{if(activeInp===lbInp) activeInp=null;});

  const edel=document.createElement('div');
  edel.className='edel'; edel.textContent='×'; edel.title='연결선 삭제';
  edel.addEventListener('mousedown',e=>e.stopPropagation());
  edel.addEventListener('click',()=>removeEdge(id));

  lbDiv.appendChild(lbInp);
  lbDiv.appendChild(edel);
  CV.appendChild(lbDiv);

  const edge={id,from:fromId,to:toId,style,path,lbEl:lbDiv,lbInp};
  edges.push(edge);
  drawEdge(edge);
  return edge;
}

function removeEdge(id){
  const i=edges.findIndex(e=>e.id===id);
  if(i<0) return;
  edges[i].path?.remove(); edges[i].lbEl?.remove(); edges.splice(i,1);
}

function drawEdge(e){
  const fn=nodes[e.from],tn=nodes[e.to];
  if(!fn||!tn) return;
  const fx=fn.x+nW(e.from)/2, fy=fn.y+nH(e.from)/2;
  const tx=tn.x+nW(e.to)/2,   ty=tn.y+nH(e.to)/2;
  const ang=Math.atan2(ty-fy,tx-fx);
  const ca=Math.cos(ang), sa=Math.sin(ang);
  const hw=nW(e.to)/2+10, hh=nH(e.to)/2+10;
  const rr=hw*hh/Math.sqrt(hh*hh*ca*ca+hw*hw*sa*sa);
  const ex=tx-ca*rr, ey=ty-sa*rr;
  const mx=(fx+ex)/2, my=(fy+ey)/2;
  const dist=Math.hypot(ex-fx,ey-fy)||1;
  const bend=Math.min(dist*.2,40);
  const nx=-(ey-fy)/dist, ny=(ex-fx)/dist;
  e.path.setAttribute('d',`M${fx} ${fy} Q${mx+nx*bend} ${my+ny*bend} ${ex} ${ey}`);
  e.lbEl.style.left=(fx+ex)/2+'px';
  e.lbEl.style.top=(fy+ey)/2+'px';
}

function redrawEdges(){edges.forEach(drawEdge);}

// ── 전역 마우스 ───────────────────────────────────────────────
document.addEventListener('mousemove',e=>{
  if(drag){
    const {x,y}=cXY(e);
    const nx=Math.max(0,x-drag.ox), ny=Math.max(0,y-drag.oy);
    if(Math.abs(nx-nodes[drag.id].x)>3||Math.abs(ny-nodes[drag.id].y)>3) drag.moved=true;
    nodes[drag.id].x=nx; nodes[drag.id].y=ny;
    nodes[drag.id].el.style.left=nx+'px'; nodes[drag.id].el.style.top=ny+'px';
    redrawEdges();
  }
  if(conn){
    const {x,y}=cXY(e);
    TP.setAttribute('d',`M${cX(conn.fromId)} ${cY(conn.fromId)} L${x} ${y}`);
  }
});

document.addEventListener('mouseup',e=>{
  if(drag) drag=null;
  if(conn){
    const tgt=e.target.closest('.node');
    if(tgt&&tgt.id!==conn.fromId) addEdge(conn.fromId,tgt.id,curLine);
    conn=null; TP.setAttribute('display','none'); TP.setAttribute('d','');
  }
});

CV.addEventListener('click',e=>{
  if(e.target===CV) selectNode(null);
});

// ── 툴바 ─────────────────────────────────────────────────────
document.querySelectorAll('.sw').forEach(sw=>{
  sw.addEventListener('mousedown',e=>e.preventDefault()); // 포커스 뺏기 방지
  sw.addEventListener('click',()=>{
    document.querySelectorAll('.sw').forEach(s=>s.classList.remove('on'));
    sw.classList.add('on'); curCol=sw.dataset.c;
    if(selId&&nodes[selId]){
      const p=PAL[curCol],n=nodes[selId];
      n.color=curCol;
      n.el.style.background=p.bg; n.el.style.borderColor=p.st; n.inp.style.color=p.tx;
      edges.forEach(e=>{
        if(e.from===selId&&e.style!=='dashed'){
          e.path.setAttribute('stroke',p.st);
          e.path.setAttribute('marker-end',`url(#${p.mk})`);
        }
      });
    }
  });
});

document.getElementById('selLine').addEventListener('change',e=>curLine=e.target.value);

document.getElementById('btnAdd').addEventListener('click',()=>{
  const x=WR.scrollLeft+100+Math.random()*200;
  const y=WR.scrollTop+80+Math.random()*120;
  const id=addNode(Math.round(x),Math.round(y),'',curCol);
  selectNode(id);
  setTimeout(()=>openEdit(id),60);
});

document.getElementById('btnDel').addEventListener('click',()=>{
  if(selId) removeNode(selId);
  else alert('삭제할 노드를 먼저 선택하세요.');
});

document.getElementById('btnReset').addEventListener('click',()=>{
  if(!confirm('모두 지울까요?')) return;
  Object.keys(nodes).forEach(removeNode);
  edges.forEach(e=>{e.path?.remove();e.lbEl?.remove();}); edges=[]; ec=0; selId=null;
});

document.getElementById('btnSave').addEventListener('click',()=>{
  const data={
    nodes:Object.values(nodes).map(n=>({id:n.el.id,x:n.x,y:n.y,color:n.color,text:n.inp.value})),
    edges:edges.map(e=>({from:e.from,to:e.to,style:e.style,label:e.lbInp.value}))
  };
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download='개념도.json'; a.click();
});

document.getElementById('btnLoad').addEventListener('click',()=>document.getElementById('fileIn').click());
document.getElementById('fileIn').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      Object.keys(nodes).forEach(removeNode);
      edges.forEach(e=>{e.path?.remove();e.lbEl?.remove();}); edges=[];
      const map={};
      data.nodes.forEach(n=>{const ni=addNode(n.x,n.y,n.text||'',n.color||'purple');map[n.id]=ni;});
      setTimeout(()=>{
        (data.edges||[]).forEach(e=>{
          const f2=map[e.from],t2=map[e.to];
          if(f2&&t2) addEdge(f2,t2,e.style||'solid',e.label||'');
        });
      },150);
    }catch{alert('파일을 읽을 수 없습니다.');}
  };
  r.readAsText(f); e.target.value='';
});
